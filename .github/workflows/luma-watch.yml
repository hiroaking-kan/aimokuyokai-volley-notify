name: Luma Watch

on:
  schedule:
    # GitHub Actions の schedule は混雑時に大量にスキップされるため、
    # 実運用上は外部 cron サービスから repository_dispatch で叩く構成にしている。
    # これはフォールバック (数時間に1回くらいは走る前提)。
    - cron: '*/15 * * * *'
  repository_dispatch:
    types: [run-check]
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テスト通知を送信する (state更新なし)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: luma-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: node scripts/check.mjs
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
          TEST_MODE: ${{ inputs.test_mode && '1' || '' }}

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain state/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "chore: update known events state"
            git push
          else
            echo "No state changes."
          fi
